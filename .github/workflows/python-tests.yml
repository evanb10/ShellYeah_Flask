name: Python Application Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Lint with pylint
      run: |
        # Run pylint on the application code
        # We use the configuration from .pylintrc
        # We allow the build to pass even if linting fails for now, 
        # remove '|| true' to strictly enforce linting standards.
        pylint app run.py config.py || true
        
    - name: Test with pytest
      run: |
        # This runs the tests we just created
        # The -v flag gives verbose output so you can see which tests passed
        python -m pytest -v